<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Happy Birthday Mom</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <button id="musicBtn">🎵Bất ngờ</button>

  <main class="card">
    <h1>Happy Birthday Mẹ!</h1>
    <p class="subtitle">Vòng xoay Happy Birthday trong nhiều thứ tiếng</p>

    <div class="wheel-wrapper">
      <canvas id="wheel" width="420" height="420"></canvas>
      <div class="pointer">▼</div>
    </div>

    <button id="spinBtn">Xoay 🎡</button>
    <p id="result">Nhấn xoay để bắt đầu!</p>
    <p id="remaining"></p>
  </main>

  <audio id="bgMusic" loop>
    <source src="audio/Song.m4a" type="audio/mp4">
  </audio>

  <script src="script.js"></script>
</body>
</html>
